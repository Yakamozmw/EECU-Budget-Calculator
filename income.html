<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget-calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <img src="../images/EECU website Logo.png">
        <h1>Wise-up Budget Calculator</h1>
    </nav>

    <header class="Page-Selector">
        <button class="navItem selected" navTo="0">Income</button>
        <button class="navItem" navTo="1">Household</button>
        <button class="navItem" navTo="2">Living</button>
        <button class="navItem" navTo="3">Finance</button>
        <button class="navItem" navTo="4">Family</button>
        <button class="navItem" navTo="5">Travel</button>
        <button class="navItem" navTo="6">Leisure</button>
        <button class="navItem" navTo="7">Result</button>
    </header>
    <main id="incomeMain">
        <!-- Pie chart -->
        <div id="mainContent">
            <section class="pie-chart">
                <canvas id="chart"></canvas>
                <div id="analysisBoxes">
                    <div id="Total-Annual-Income">
                        <h4>Annual Income</h4>
                        <p>$5716</p>
                    </div>

                    <div id="Total-Expenses">
                        <h4>Expenses</h4>
                        <p>$0</p>
                    </div>
                </div>
            </section>

            <!-- Right section -->
            <section id="inputFields">
                <section id="Incomes" class="field">
                    <h1>Income</h1>
                    <p>Please enter a career or manually enter an income</p>

                    <h4>Gross Annual Income</h4>
                    <input type="number" placeholder="$" id="Income-Input">

                    <h4>Career Selection</h4>
                    <select name="career" placeholder="Value" id="Career-Selection">
                        <<option value="Placeholder">Placeholder</option>
                            <option value="Placeholder">Placeholder</option>
                            <option value="Placeholder">Placeholder</option>
                    </select>
                </section>

                <section id="Household " class="field hidden">
                    <h1>Household</h1>
                    <p>Regular household expenses like rent, utility, and mortgage</p>

                    <h4>Rent/Mortgage</h4>
                    <input type="number" placeholder="$" id="Rent-Mortgage">

                    <h4>Electricity</h4>
                    <input name="career" placeholder="$" id="Electricity">

                    <h4>Gas</h4>
                    <input name="career" placeholder="$" id="Gas">

                    <h4>Water</h4>
                    <input name="career" placeholder="$" id="Water">

                    <h4>Internet</h4>
                    <input name="career" placeholder="$" id="Internet">
                </section>

                <!-- Someone make the other fields!!! NOW -->
            </section>
        </div>

        <section>
            <!-- JS: .eventListener to button to remove/add hidden class to select input field -->
            <button id="nextStep">Next Step</button>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
